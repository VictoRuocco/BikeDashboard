<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeWidget</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #12141c;
            border-bottom: 1px solid #1f2330;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1db954;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
        }

        .logo-area svg {
            width: 18px;
            height: 18px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            font-weight: 600;
            color: #7a7f91;
            text-transform: uppercase;
        }

        .toggle-container .active-label {
            color: #ffffff;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2e3440;
            transition: .3s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #a3be8c;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #4c566a;
        }

        input:checked + .slider:before {
            transform: translateX(20px);
            background-color: #d8dee9;
        }

        /* --- MAIN LAYOUT --- */
        .widget-container {
            flex: 1;
            display: flex;
            width: 100%;
        }

        /* Colonna Sinistra: Orologio */
        .clock-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 1px solid #1f2330;
            padding: 20px;
            position: relative;
        }

        .time-display {
            text-align: center;
            margin-bottom: 20px;
        }

        .time-hours-mins {
            font-size: 72px;
            font-weight: 300;
            line-height: 1;
            color: #ffffff;
        }

        .time-seconds {
            font-size: 32px;
            font-weight: 400;
            color: #1db954;
            margin-top: 5px;
            display: block;
        }

        .date-display {
            font-size: 14px;
            color: #7a7f91;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .progress-circle-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .progress-circle-container svg {
            transform: rotate(-90deg);
            width: 120px;
            height: 120px;
        }

        .progress-circle-bg {
            fill: none;
            stroke: #1f2330;
            stroke-width: 6;
        }

        .progress-circle-bar {
            fill: none;
            stroke: #1db954;
            stroke-width: 6;
            stroke-dasharray: 339.29;
            stroke-dashoffset: 0;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .circle-text {
            position: absolute;
            font-size: 13px;
            color: #1db954;
            font-weight: 500;
        }

        .screen-status {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #12141c;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #7a7f91;
            border: 1px solid #1f2330;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #a3be8c;
            border-radius: 50%;
            box-shadow: 0 0 8px #a3be8c;
        }

        /* Colonna Destra: Spotify */
        .spotify-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 30px 20px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            color: #53586b;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            align-self: flex-start;
        }

        .album-art-container {
            width: 100%;
            max-width: 220px;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            background-color: #12141c;
        }

        .album-art-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .track-details {
            width: 100%;
            max-width: 220px;
            text-align: left;
            margin-bottom: 15px;
        }

        .track-title {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .track-artist {
            font-size: 13px;
            color: #7a7f91;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Barra avanzamento */
        .track-progress-wrapper {
            width: 100%;
            max-width: 220px;
            margin-bottom: 25px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background-color: #1f2330;
            border-radius: 2px;
            margin-bottom: 8px;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: #1db954;
            border-radius: 2px;
            transition: width 1s linear;
        }

        .time-stamps {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #53586b;
            font-weight: 500;
        }

        /* CONTROLLI MULTIMEDIALI FISSI */
        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            width: 100%;
            max-width: 220px;
            margin-bottom: 20px;
        }

        .control-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            transition: transform 0.1s ease;
        }

        .control-btn:active {
            transform: scale(0.9);
        }

        .control-btn.secondary svg {
            width: 26px;
            height: 26px;
            fill: #7a7f91;
        }
        .control-btn.secondary:hover svg {
            fill: #ffffff;
        }

        /* Il cerchione verde della foto */
        .control-btn.main-play {
            width: 64px;
            height: 64px;
            background-color: #1db954;
            border-radius: 50%;
            box-shadow: 0 4px 12px rgba(29, 185, 84, 0.3);
        }

        .control-btn.main-play svg {
            width: 28px;
            height: 28px;
            fill: #000000;
        }

        .status-message {
            font-size: 12px;
            font-weight: 600;
            color: #1db954;
            letter-spacing: 0.5px;
            margin-top: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM5 12c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8.5c-1.9 0-3.5-1.6-3.5-3.5S3.1 13.5 5 13.5s3.5 1.6 3.5 3.5-1.6 3.5-3.5 3.5zm14.5-8.5c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zm0 8.5c-1.9 0-3.5-1.6-3.5-3.5s1.6-3.5 3.5-3.5 3.5 1.6 3.5 3.5-1.6 3.5-3.5 3.5zm-5.7-8.3l-2.4-3.7c-.4-.6-1.1-1-1.8-1H6v2h3.4l1.8 2.8-3.7 7.3h2.2l2.8-5.7 3.5 3.2c.4.4 1 .6 1.5.6H21v-2h-4.3l-2.9-2.5z"/></svg>
            BIKEWIDGET
        </div>
        <div class="toggle-container">
            <span>Normale</span>
            <label class="switch">
                <input type="checkbox" id="mode-toggle">
                <span class="slider"></span>
            </label>
            <span class="active-label">Blocco</span>
        </div>
    </header>

    <div class="widget-container">
        
        <div class="clock-column">
            <div class="time-display">
                <div class="time-hours-mins" id="clock-time">00:00</div>
                <div class="time-seconds" id="clock-seconds">: 00</div>
            </div>
            <div class="date-display" id="clock-date">---</div>
            <div class="progress-circle-container">
                <svg>
                    <circle class="progress-circle-bg" cx="60" cy="60" r="54"></circle>
                    <circle class="progress-circle-bar" id="seconds-circle" cx="60" cy="60" r="54"></circle>
                </svg>
                <div class="circle-text" id="circle-inner-time">00:00</div>
            </div>
            <div class="screen-status">
                <div class="status-dot"></div>
                Schermo attivo
            </div>
        </div>

        <div class="spotify-column">
            <div class="section-title">In riproduzione</div>
            <div class="album-art-container">
                <img id="album-cover" src="icon-192.png" alt="Album Art">
            </div>
            <div class="track-details">
                <div class="track-title" id="track-name">Nessuna traccia</div>
                <div class="track-artist" id="track-artist">Spotify scollegato</div>
            </div>
            <div class="track-progress-wrapper">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="track-progress-bar"></div>
                </div>
                <div class="time-stamps">
                    <span id="time-current">0:00</span>
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <div class="player-controls">
                <button class="control-btn secondary" id="btn-prev">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6L18 18V6z"/></svg>
                </button>
                <button class="control-btn main-play" id="btn-play-pause">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="control-btn secondary" id="btn-next">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"/></svg>
                </button>
            </div>
            <div class="status-message" id="auth-status">Connetti Spotify</div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURA QUI IL TUO CLIENT ID SPOTIFY
        // ==========================================
        const CLIENT_ID = '7ff19c5a7f6744b8b16c84883a384e3c'; 
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        const SCOPES = 'user-read-currently-playing user-modify-playback-state';

        // Elementi DOM
        const circleBar = document.getElementById('seconds-circle');
        const circumference = 2 * Math.PI * 54;
        circleBar.style.strokeDasharray = `${circumference} ${circumference}`;

        // 1. Gestione Orologio Locale
        function updateClock() {
            const now = new Date();
            let h = now.getHours().toString().padStart(2, '0');
            let m = now.getMinutes().toString().padStart(2, '0');
            let s = now.getSeconds();

            document.getElementById('clock-time').textContent = `${h}:${m}`;
            document.getElementById('circle-inner-time').textContent = `${h}:${m}`;
            document.getElementById('clock-seconds').textContent = `: ${s.toString().padStart(2, '0')}`;

            const dateOptions = { weekday: 'long', day: 'numeric', month: 'short' };
            document.getElementById('clock-date').textContent = now.toLocaleDateString('it-IT', dateOptions).replace('.', '');
            circleBar.style.strokeDashoffset = circumference - (s / 60) * circumference;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Autenticazione OAuth implicit grant di Spotify
        let accessToken = new URLSearchParams(window.location.hash.substring(1)).get('access_token');
        
        if (!accessToken) {
            document.getElementById('auth-status').addEventListener('click', () => {
                window.location.href = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(SCOPES)}&response_type=token&show_dialog=true`;
            });
        } else {
            window.location.hash = ''; // Pulisce l'URL
            document.getElementById('auth-status').textContent = "Spotify Connesso";
            document.getElementById('auth-status').style.color = "#1db954";
            
            // Avvia il loop di aggiornamento dei dati traccia
            setInterval(fetchCurrentTrack, 3000);
            fetchCurrentTrack();
        }

        // 3. Recupero traccia in tempo reale
        function formatTime(ms) {
            let totalSecs = Math.floor(ms / 1000);
            let mins = Math.floor(totalSecs / 60);
            let secs = (totalSecs % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        }

        function fetchCurrentTrack() {
            fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                headers: { 'Authorization': 'Bearer ' + accessToken }
            })
            .then(res => {
                if(res.status === 401) { window.location.reload(); } // Token scaduto
                if(res.status === 204) return null; // Nessuna traccia attiva
                return res.json();
            })
            .then(data => {
                if(!data || !data.item) return;

                document.getElementById('track-name').textContent = data.item.name;
                document.getElementById('track-artist').textContent = data.item.artists.map(a => a.name).join(', ');
                document.getElementById('album-cover').src = data.item.album.images[0].url;
                
                // Aggiorna progressi
                let progress = data.progress_ms;
                let duration = data.item.duration_ms;
                document.getElementById('time-current').textContent = formatTime(progress);
                document.getElementById('time-total').textContent = formatTime(duration);
                document.getElementById('track-progress-bar').style.width = `${(progress / duration) * 100}%`;

                // Aggiorna Icona Stato Play/Pause
                const playIcon = document.getElementById('play-icon');
                if(data.is_playing) {
                    playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'; // Icona Pausa
                } else {
                    playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>'; // Icona Play
                }
            })
            .catch(err => console.log("Errore API:", err));
        }

        // 4. Azioni dei bottoni (API di controllo)
        function spotifyControl(action, method = 'POST') {
            fetch(`https://api.spotify.com/v1/me/player/${action}`, {
                method: method,
                headers: { 'Authorization': 'Bearer ' + accessToken }
            }).then(() => setTimeout(fetchCurrentTrack, 500));
        }

        document.getElementById('btn-next').addEventListener('click', () => spotifyControl('next'));
        document.getElementById('btn-prev').addEventListener('click', () => spotifyControl('previous'));
        
        document.getElementById('btn-play-pause').addEventListener('click', () => {
            const playIcon = document.getElementById('play-icon');
            // Controllo grossolano basato sull'icona attuale per invertire lo stato
            if(playIcon.innerHTML.includes('M6')) { 
                spotifyControl('pause', 'PUT');
            } else {
                spotifyControl('play', 'PUT');
            }
        });
    </script>
</body>
</html>
