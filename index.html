<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BikeWidget">
<link rel="manifest" href="manifest.json">
<title>BikeWidget</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --text: #f0f0f8;
    --muted: #6b7280;
    --border: rgba(255,255,255,0.08);
    --green: #22c55e;
    --amber: #f59e0b;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    touch-action: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
  }

  /* === TOP BAR === */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }

  #logo {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--accent2);
    text-transform: uppercase;
  }

  /* Toggle switch */
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toggle-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .toggle {
    position: relative;
    width: 44px;
    height: 24px;
    cursor: pointer;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider-t {
    position: absolute;
    inset: 0;
    background: var(--surface2);
    border-radius: 12px;
    border: 0.5px solid var(--border);
    transition: background 0.2s;
  }
  .slider-t::before {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    left: 3px; top: 3px;
    background: var(--muted);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle input:checked + .slider-t { background: #1e3a5f; }
  .toggle input:checked + .slider-t::before { transform: translateX(20px); background: var(--accent); }

  /* === MAIN === */
  #main {
    display: flex;
    flex: 1;
    gap: 0;
    overflow: hidden;
  }

  /* === CLOCK PANEL === */
  #clock-panel {
    width: 45%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border-right: 0.5px solid var(--border);
    padding: 20px 12px;
    gap: 16px;
  }

  #clock-time {
    font-size: clamp(42px, 12vw, 72px);
    font-weight: 200;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  #clock-seconds {
    font-size: clamp(18px, 5vw, 28px);
    font-weight: 300;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }

  #clock-date {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
  }

  /* Ring timer */
  #ring-wrap {
    position: relative;
    width: 80px; height: 80px;
  }
  #ring-wrap svg { transform: rotate(-90deg); }
  #ring-bg { stroke: var(--surface2); }
  #ring-fill { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset 0.9s linear; }
  #ring-time {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 0.05em;
  }

  /* Always-on toggle */
  #awake-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }
  #awake-btn.active {
    border-color: var(--accent);
    color: var(--accent2);
  }
  #awake-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.2s;
  }
  #awake-btn.active #awake-dot { background: var(--green); }

  /* === MUSIC PANEL === */
  #music-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    padding: 16px 14px;
    gap: 14px;
    overflow: hidden;
  }

  #now-playing-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  #track-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  #track-title {
    font-size: clamp(14px, 3.5vw, 18px);
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #track-artist {
    font-size: clamp(11px, 2.5vw, 14px);
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Album art placeholder */
  #art-wrap {
    width: 100%;
    aspect-ratio: 1;
    max-height: 120px;
    background: var(--surface2);
    border-radius: 10px;
    border: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }

  #art-icon {
    font-size: 36px;
    opacity: 0.25;
  }

  /* Progress bar */
  #progress-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #progress-bar-bg {
    width: 100%;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  #progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 1s linear;
  }

  #progress-times {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }

  /* Controls */
  #controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
    -webkit-appearance: none;
    font-size: 22px;
  }
  .ctrl-btn:active { background: var(--surface2); color: var(--text); }
  .ctrl-btn:hover { color: var(--text); }

  #play-btn {
    width: 52px; height: 52px;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    font-size: 20px;
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
    flex-shrink: 0;
  }
  #play-btn:active { transform: scale(0.93); }

  /* Volume */
  #vol-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #vol-icon { font-size: 14px; color: var(--muted); }
  #vol-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent2);
    cursor: pointer;
  }

  /* Media session status */
  #media-status {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    padding: 4px 0;
    letter-spacing: 0.04em;
  }

  #media-status.connected { color: var(--green); }
  #media-status.error { color: var(--amber); }

  /* === LOCKSCREEN OVERLAY === */
  #lockscreen {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    cursor: pointer;
  }
  #lockscreen.visible { display: flex; }

  #ls-time {
    font-size: clamp(56px, 18vw, 96px);
    font-weight: 100;
    color: #fff;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }

  #ls-date {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  #ls-music {
    background: rgba(255,255,255,0.08);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 16px 24px;
    width: 280px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  #ls-track-title {
    font-size: 16px;
    font-weight: 500;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #ls-track-artist {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #ls-controls {
    display: flex;
    justify-content: center;
    gap: 24px;
    align-items: center;
  }

  .ls-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.7);
    font-size: 24px;
    cursor: pointer;
    padding: 4px;
    display: flex; align-items: center; justify-content: center;
  }

  #ls-play-btn {
    width: 48px; height: 48px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    border: none;
    color: #fff;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  #ls-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* Tabler icons via CDN */
  @import url('https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css');
</style>
</head>
<body>

<div id="app">
  <!-- TOP BAR -->
  <div id="topbar">
    <span id="logo">🚴 BikeWidget</span>
    <div class="toggle-wrap">
      <span class="toggle-label" id="mode-label">NORMALE</span>
      <label class="toggle">
        <input type="checkbox" id="lockmode-toggle">
        <span class="slider-t"></span>
      </label>
      <span class="toggle-label">BLOCCO</span>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- CLOCK -->
    <div id="clock-panel">
      <div>
        <div id="clock-time">00:00</div>
        <div style="display:flex;align-items:baseline;gap:6px;justify-content:center;margin-top:4px;">
          <span style="font-size:13px;color:var(--muted)">:</span>
          <span id="clock-seconds" style="font-size:clamp(24px,7vw,40px)">00</span>
        </div>
      </div>
      <div id="clock-date">—</div>

      <!-- Minute ring -->
      <div id="ring-wrap">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle id="ring-bg" cx="40" cy="40" r="34" fill="none" stroke-width="5"/>
          <circle id="ring-fill" cx="40" cy="40" r="34" fill="none" stroke-width="5"
            stroke-dasharray="213.6" stroke-dashoffset="213.6"/>
        </svg>
        <div id="ring-time">00:00</div>
      </div>

      <button id="awake-btn">
        <span id="awake-dot"></span>
        <span id="awake-text">Schermo attivo</span>
      </button>
    </div>

    <!-- MUSIC -->
    <div id="music-panel">
      <div id="now-playing-label">In riproduzione</div>

      <div id="art-wrap">
        <span id="art-icon">♪</span>
      </div>

      <div id="track-info">
        <div id="track-title">Nessuna traccia</div>
        <div id="track-artist">—</div>
      </div>

      <div id="progress-wrap">
        <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
        <div id="progress-times">
          <span id="time-current">0:00</span>
          <span id="time-total">0:00</span>
        </div>
      </div>

      <div id="controls">
        <button class="ctrl-btn" id="btn-prev" aria-label="Precedente">
          <i class="ti ti-player-skip-back" aria-hidden="true"></i>
        </button>
        <button id="play-btn" aria-label="Play/Pausa">
          <i class="ti ti-player-play" id="play-icon" aria-hidden="true"></i>
        </button>
        <button class="ctrl-btn" id="btn-next" aria-label="Successivo">
          <i class="ti ti-player-skip-forward" aria-hidden="true"></i>
        </button>
      </div>

      <div id="vol-wrap">
        <i class="ti ti-volume" id="vol-icon" aria-hidden="true" style="font-size:16px;color:var(--muted)"></i>
        <input type="range" id="vol-slider" min="0" max="100" value="80">
      </div>

      <div id="media-status">Nessun media in riproduzione</div>
    </div>

  </div>
</div>

<!-- LOCKSCREEN OVERLAY -->
<div id="lockscreen" role="button" aria-label="Tocca per sbloccare">
  <div id="ls-time">00:00</div>
  <div id="ls-date">—</div>

  <div id="ls-music">
    <div style="font-size:10px;letter-spacing:0.1em;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-bottom:2px">In riproduzione</div>
    <div id="ls-track-title">Nessuna traccia</div>
    <div id="ls-track-artist">—</div>
    <div id="ls-controls">
      <button class="ls-btn" id="ls-prev" aria-label="Precedente">
        <i class="ti ti-player-skip-back" aria-hidden="true"></i>
      </button>
      <button id="ls-play-btn" aria-label="Play/Pausa">
        <i class="ti ti-player-play" id="ls-play-icon" aria-hidden="true"></i>
      </button>
      <button class="ls-btn" id="ls-next" aria-label="Successivo">
        <i class="ti ti-player-skip-forward" aria-hidden="true"></i>
      </button>
    </div>
  </div>

  <div id="ls-hint">Tocca per tornare all'app</div>
</div>

<script>
// =====================
// CLOCK
// =====================
const DAYS = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const MONTHS = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
const pad = n => String(n).padStart(2,'0');

function updateClock() {
  const now = new Date();
  const h = pad(now.getHours()), m = pad(now.getMinutes()), s = pad(now.getSeconds());

  document.getElementById('clock-time').textContent = `${h}:${m}`;
  document.getElementById('clock-seconds').textContent = s;
  document.getElementById('ls-time').textContent = `${h}:${m}`;

  const dateStr = `${DAYS[now.getDay()]} ${now.getDate()} ${MONTHS[now.getMonth()]}`;
  document.getElementById('clock-date').textContent = dateStr;
  document.getElementById('ls-date').textContent = dateStr;
  document.getElementById('ring-time').textContent = `${h}:${m}`;

  // ring: mostra i secondi del minuto corrente
  const secInMin = now.getSeconds();
  const circumference = 213.6;
  const offset = circumference - (secInMin / 60) * circumference;
  document.getElementById('ring-fill').style.strokeDashoffset = offset;
}

setInterval(updateClock, 1000);
updateClock();

// =====================
// WAKE LOCK
// =====================
let wakeLock = null;
const awakeBtn = document.getElementById('awake-btn');
const awakeText = document.getElementById('awake-text');
const awakeDot = document.getElementById('awake-dot');

async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      awakeBtn.classList.add('active');
      awakeText.textContent = 'Schermo bloccato ON';
      wakeLock.addEventListener('release', () => {
        awakeBtn.classList.remove('active');
        awakeText.textContent = 'Schermo attivo';
        wakeLock = null;
      });
    } catch(e) {
      awakeText.textContent = 'Non supportato';
    }
  } else {
    awakeText.textContent = 'Non supportato';
  }
}

async function releaseWakeLock() {
  if (wakeLock) { await wakeLock.release(); }
  awakeBtn.classList.remove('active');
  awakeText.textContent = 'Schermo attivo';
}

awakeBtn.addEventListener('click', () => {
  if (wakeLock) releaseWakeLock(); else requestWakeLock();
});

// Re-acquisisci wake lock dopo visibilità
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !wakeLock) {
    const btn = awakeBtn;
    if (btn.classList.contains('active')) requestWakeLock();
  }
});

// =====================
// MEDIA SESSION API
// =====================
let isPlaying = false;
const statusEl = document.getElementById('media-status');
const playIcon = document.getElementById('play-icon');
const lsPlayIcon = document.getElementById('ls-play-icon');
const trackTitle = document.getElementById('track-title');
const trackArtist = document.getElementById('track-artist');
const lsTitle = document.getElementById('ls-track-title');
const lsArtist = document.getElementById('ls-track-artist');
const progressFill = document.getElementById('progress-bar-fill');
const timeCurrent = document.getElementById('time-current');
const timeTotal = document.getElementById('time-total');

function setPlayState(playing) {
  isPlaying = playing;
  const iconClass = playing ? 'ti-player-pause' : 'ti-player-play';
  playIcon.className = `ti ${iconClass}`;
  lsPlayIcon.className = `ti ${iconClass}`;
}

function fmtTime(sec) {
  if (!sec || isNaN(sec)) return '0:00';
  const m = Math.floor(sec/60), s = Math.floor(sec%60);
  return `${m}:${pad(s)}`;
}

function updateMediaInfo() {
  if ('mediaSession' in navigator) {
    const meta = navigator.mediaSession.metadata;
    if (meta) {
      const title = meta.title || 'Traccia sconosciuta';
      const artist = meta.artist || meta.album || '—';
      trackTitle.textContent = title;
      trackArtist.textContent = artist;
      lsTitle.textContent = title;
      lsArtist.textContent = artist;
      statusEl.textContent = 'Media sessione attiva';
      statusEl.className = 'connected';
    } else {
      trackTitle.textContent = 'Nessuna traccia';
      trackArtist.textContent = '—';
      lsTitle.textContent = 'Nessuna traccia';
      lsArtist.textContent = '—';
      statusEl.textContent = 'Nessun media in riproduzione';
      statusEl.className = '';
    }

    const ps = navigator.mediaSession.playbackState;
    if (ps === 'playing') setPlayState(true);
    else if (ps === 'paused') setPlayState(false);
  }
}

// Polling media session ogni 2 sec (l'API non ha eventi di cambio metadati)
setInterval(updateMediaInfo, 2000);
updateMediaInfo();

// Controlli
function mediaAction(action) {
  try {
    // Usa MediaSession action se disponibile
    if ('mediaSession' in navigator) {
      // Prova a triggerare l'azione via MediaSession
      navigator.mediaSession.callActionHandler ? 
        navigator.mediaSession.callActionHandler(action) : null;
    }
  } catch(e) {}
}

document.getElementById('play-btn').addEventListener('click', () => {
  if (isPlaying) {
    try { navigator.mediaSession.callActionHandler('pause'); } catch(e) {}
  } else {
    try { navigator.mediaSession.callActionHandler('play'); } catch(e) {}
  }
  // fallback toggle visivo
  setPlayState(!isPlaying);
});

document.getElementById('btn-prev').addEventListener('click', () => {
  try { navigator.mediaSession.callActionHandler('previoustrack'); } catch(e) {}
});

document.getElementById('btn-next').addEventListener('click', () => {
  try { navigator.mediaSession.callActionHandler('nexttrack'); } catch(e) {}
});

document.getElementById('ls-play-btn').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('play-btn').click();
});

document.getElementById('ls-prev').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('btn-prev').click();
});

document.getElementById('ls-next').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('btn-next').click();
});

// Volume via Web Audio / HTML5 media (best-effort)
document.getElementById('vol-slider').addEventListener('input', e => {
  const val = e.target.value / 100;
  // Applica al primo elemento media trovato nella pagina
  document.querySelectorAll('audio,video').forEach(el => el.volume = val);
});

// =====================
// LOCKSCREEN MODE
// =====================
const lockscreen = document.getElementById('lockscreen');
const lockmodeToggle = document.getElementById('lockmode-toggle');

lockmodeToggle.addEventListener('change', () => {
  if (lockmodeToggle.checked) {
    lockscreen.classList.add('visible');
    document.getElementById('mode-label').textContent = 'NORMALE';
  } else {
    lockscreen.classList.remove('visible');
    document.getElementById('mode-label').textContent = 'BLOCCO';
  }
});

lockscreen.addEventListener('click', () => {
  lockscreen.classList.remove('visible');
  lockmodeToggle.checked = false;
  document.getElementById('mode-label').textContent = 'NORMALE';
});

// Impedisci swipe chiusura lockscreen
lockscreen.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// =====================
// SERVICE WORKER
// =====================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
