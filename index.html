<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BikeWidget">
<link rel="manifest" href="manifest.json">
<title>BikeWidget</title>
<style>
/* ─────────────────────────────────────────────
   RESET & VARIABILI
───────────────────────────────────────────── */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

:root {
  --bg:       #0a0a12;
  --surf:     #12121e;
  --surf2:    #1e1e2e;
  --surf3:    #252538;
  --accent:   #4f8ef7;
  --accent2:  #93c5fd;
  --text:     #f0f0fa;
  --text2:    #a0a8c0;
  --muted:    #505870;
  --border:   rgba(255,255,255,0.09);
  --green:    #34d399;
  --amber:    #fbbf24;
  --red:      #f87171;

  /* Galaxy A55 landscape: 2340×1080 fisici, density=3 → ~780×360 CSS dp */
  /* Topbar: 32px → rimane 328px di altezza utile */
  --topbar-h: 32px;
  --content-h: calc(100vh - var(--topbar-h));
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
  overflow: hidden;
  touch-action: none;
}

/* ─────────────────────────────────────────────
   APP ROOT
───────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
}

/* ─────────────────────────────────────────────
   TOP BAR
───────────────────────────────────────────── */
#topbar {
  height: var(--topbar-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#logo {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .2em;
  color: var(--accent2);
  text-transform: uppercase;
}

/* Toggle Normale / Blocco */
.tog-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
.tog-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .06em;
  text-transform: uppercase;
}
.tog {
  position: relative;
  width: 38px; height: 20px;
  cursor: pointer;
}
.tog input { opacity: 0; width: 0; height: 0; }
.tog-track {
  position: absolute; inset: 0;
  background: var(--surf3);
  border-radius: 10px;
  border: 1px solid var(--border);
  transition: background .2s;
}
.tog-thumb {
  position: absolute;
  width: 14px; height: 14px;
  left: 3px; top: 3px;
  background: var(--muted);
  border-radius: 50%;
  transition: transform .2s, background .2s;
}
.tog input:checked ~ .tog-track { background: #1a3060; }
.tog input:checked ~ .tog-thumb { transform: translateX(18px); background: var(--accent); }

/* ─────────────────────────────────────────────
   MAIN — due colonne landscape
───────────────────────────────────────────── */
#main {
  display: flex;
  flex: 1;
  height: var(--content-h);
  overflow: hidden;
}

/* ══════════════════════════════════════════
   PANNELLO OROLOGIO  — sinistra 40%
══════════════════════════════════════════ */
#clock-panel {
  width: 40%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--surf);
  border-right: 1px solid var(--border);
  padding: 10px 12px;
  gap: 8px;
}

/* HH:MM grande */
#clock-hm {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  line-height: 1;
}
#clock-time {
  font-size: clamp(60px, 15vw, 100px);
  font-weight: 100;
  letter-spacing: -.04em;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
#clock-colon-sec {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 6px;
  gap: 2px;
}
.colon-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
}
#clock-seconds {
  font-size: clamp(22px, 5vw, 36px);
  font-weight: 300;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}

/* Data */
#clock-date {
  font-size: clamp(10px, 1.6vw, 13px);
  color: var(--text2);
  letter-spacing: .1em;
  text-transform: uppercase;
}

/* Ring anello minuti */
#ring-wrap {
  position: relative;
  width: clamp(56px, 10vw, 80px);
  height: clamp(56px, 10vw, 80px);
}
#ring-wrap svg {
  width: 100%; height: 100%;
  transform: rotate(-90deg);
}
#ring-bg   { stroke: var(--surf3); }
#ring-fill {
  stroke: var(--accent);
  stroke-linecap: round;
  stroke-dasharray: 213.6;
  stroke-dashoffset: 213.6;
  transition: stroke-dashoffset .9s linear;
}
#ring-label {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  color: var(--accent2);
  letter-spacing: .03em;
  font-variant-numeric: tabular-nums;
}

/* Pulsante Wake Lock */
#awake-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surf3);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 5px 12px;
  font-size: 10px;
  color: var(--text2);
  cursor: pointer;
  transition: border-color .2s, color .2s;
}
#awake-btn.on { border-color: var(--green); color: var(--green); }
#awake-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  transition: background .2s;
  flex-shrink: 0;
}
#awake-btn.on #awake-dot { background: var(--green); }

/* ══════════════════════════════════════════
   PANNELLO PLAYER  — destra 60%
══════════════════════════════════════════ */
#music-panel {
  flex: 1;
  height: 100%;
  display: flex;
  flex-direction: row;          /* art | info */
  align-items: center;
  padding: 10px 16px;
  gap: 16px;
  background: var(--bg);
  overflow: hidden;
}

/* ── Album art ── */
#art-wrap {
  width: clamp(90px, 18vw, 140px);
  height: clamp(90px, 18vw, 140px);
  flex-shrink: 0;
  background: var(--surf2);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ── Colonna info + controlli ── */
#music-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 6px;
  overflow: hidden;
  min-width: 0;
}

#np-label {
  font-size: 9px;
  letter-spacing: .14em;
  color: var(--muted);
  text-transform: uppercase;
}

#track-title {
  font-size: clamp(14px, 2.8vw, 20px);
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#track-artist {
  font-size: clamp(11px, 1.9vw, 15px);
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Progress */
#progress-wrap { display: flex; flex-direction: column; gap: 4px; }
#progress-bar-bg {
  width: 100%; height: 3px;
  background: var(--surf3);
  border-radius: 2px;
  overflow: hidden;
}
#progress-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  transition: width 1s linear;
}
#progress-times {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

/* ── Controlli ── */
#controls {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Pulsanti secondari (prev/next) */
.ctrl-btn {
  width: clamp(40px, 7vw, 52px);
  height: clamp(40px, 7vw, 52px);
  background: var(--surf2);
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .15s, border-color .15s;
}
.ctrl-btn:active { background: var(--surf3); border-color: var(--accent); }

/* Play / Pausa */
#play-btn {
  width: clamp(50px, 9vw, 66px);
  height: clamp(50px, 9vw, 66px);
  background: var(--accent);
  border: none;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform .1s, background .2s;
}
#play-btn:active { transform: scale(.91); background: #2563eb; }

/* ── Volume ── */
#vol-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
#vol-slider {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  height: 3px;
  background: var(--surf3);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
#vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--accent2);
  cursor: pointer;
  border: 2px solid var(--bg);
}

/* ── Status ── */
#media-status {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: .04em;
}
#media-status.ok  { color: var(--green); }
#media-status.err { color: var(--amber); }

/* ═════════════════════════════════════════════════
   LOCKSCREEN OVERLAY
═════════════════════════════════════════════════ */
#lockscreen {
  display: none;
  position: fixed; inset: 0;
  background: #000;
  z-index: 200;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 60px;
  cursor: pointer;
}
#lockscreen.show { display: flex; }

/* Clock lockscreen */
#ls-clock { display: flex; flex-direction: column; align-items: center; gap: 6px; }
#ls-time {
  font-size: clamp(70px, 18vw, 120px);
  font-weight: 100;
  color: #fff;
  letter-spacing: -.04em;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
#ls-date {
  font-size: 12px;
  color: rgba(255,255,255,.4);
  letter-spacing: .1em;
  text-transform: uppercase;
}

/* Card musicale lockscreen */
#ls-music {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 18px;
  padding: 16px 20px;
  width: clamp(200px, 32vw, 280px);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
#ls-np-label { font-size: 9px; letter-spacing: .12em; color: rgba(255,255,255,.3); text-transform: uppercase; }
#ls-title  { font-size: 15px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#ls-artist { font-size: 12px; color: rgba(255,255,255,.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

#ls-controls { display: flex; justify-content: center; align-items: center; gap: 20px; }

.ls-ctrl-btn {
  width: 40px; height: 40px;
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.ls-ctrl-btn:active { background: rgba(255,255,255,.2); }

#ls-play-btn {
  width: 48px; height: 48px;
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
#ls-play-btn:active { background: rgba(255,255,255,.3); }

#ls-hint { font-size: 10px; color: rgba(255,255,255,.2); letter-spacing: .08em; text-transform: uppercase; text-align: center; }
</style>
</head>
<body>
<div id="app">

  <!-- ── TOP BAR ── -->
  <div id="topbar">
    <span id="logo">🚴 BikeWidget</span>
    <div class="tog-wrap">
      <span class="tog-label">Normale</span>
      <label class="tog" aria-label="Modalità lockscreen">
        <input type="checkbox" id="lockmode-toggle">
        <span class="tog-track"></span>
        <span class="tog-thumb"></span>
      </label>
      <span class="tog-label">Blocco</span>
    </div>
  </div>

  <!-- ── MAIN ── -->
  <div id="main">

    <!-- ════ OROLOGIO ════ -->
    <div id="clock-panel">

      <div id="clock-hm">
        <div id="clock-time">00:00</div>
        <div id="clock-colon-sec">
          <span class="colon-dot"></span>
          <span id="clock-seconds">00</span>
          <span class="colon-dot"></span>
        </div>
      </div>

      <div id="clock-date">—</div>

      <!-- Anello minuti -->
      <div id="ring-wrap" aria-label="Avanzamento minuto">
        <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
          <circle id="ring-bg"   cx="40" cy="40" r="34" fill="none" stroke-width="5"/>
          <circle id="ring-fill" cx="40" cy="40" r="34" fill="none" stroke-width="5"/>
        </svg>
        <div id="ring-label">MIN</div>
      </div>

      <!-- Wake lock -->
      <button id="awake-btn" type="button">
        <span id="awake-dot"></span>
        <span id="awake-text">Schermo attivo</span>
      </button>

    </div><!-- /clock-panel -->

    <!-- ════ PLAYER ════ -->
    <div id="music-panel">

      <!-- Art -->
      <div id="art-wrap" aria-label="Copertina album">
        <!-- Nota musicale SVG inline, sempre visibile -->
        <svg id="art-icon" width="54" height="54" viewBox="0 0 24 24" fill="none"
             xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M9 18V5l12-2v13" stroke="#4f8ef7" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="6" cy="18" r="3" stroke="#4f8ef7" stroke-width="1.5"/>
          <circle cx="18" cy="16" r="3" stroke="#4f8ef7" stroke-width="1.5"/>
        </svg>
      </div>

      <!-- Info + controlli -->
      <div id="music-info">

        <div id="np-label">In riproduzione</div>
        <div id="track-title">Nessuna traccia</div>
        <div id="track-artist">—</div>

        <!-- Progress -->
        <div id="progress-wrap">
          <div id="progress-bar-bg">
            <div id="progress-bar-fill"></div>
          </div>
          <div id="progress-times">
            <span id="time-current">0:00</span>
            <span id="time-total">0:00</span>
          </div>
        </div>

        <!-- Controlli con icone SVG inline -->
        <div id="controls">

          <!-- Precedente -->
          <button class="ctrl-btn" id="btn-prev" type="button" aria-label="Brano precedente">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M19 20L9 12l10-8v16Z" fill="#f0f0fa"/>
              <rect x="5" y="4" width="2.5" height="16" rx="1.25" fill="#f0f0fa"/>
            </svg>
          </button>

          <!-- Play / Pausa -->
          <button id="play-btn" type="button" aria-label="Play/Pausa">
            <svg id="play-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 4l14 8-14 8V4Z" fill="#ffffff"/>
            </svg>
          </button>

          <!-- Successivo -->
          <button class="ctrl-btn" id="btn-next" type="button" aria-label="Brano successivo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M5 4l10 8-10 8V4Z" fill="#f0f0fa"/>
              <rect x="16.5" y="4" width="2.5" height="16" rx="1.25" fill="#f0f0fa"/>
            </svg>
          </button>

        </div><!-- /controls -->

        <!-- Volume -->
        <div id="vol-wrap">
          <!-- Icona volume SVG inline -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="flex-shrink:0">
            <path d="M11 5L6 9H2v6h4l5 4V5Z" fill="#505870"/>
            <path d="M15.5 8.5a5 5 0 0 1 0 7M18.5 6a9 9 0 0 1 0 12" stroke="#505870" stroke-width="1.5"
                  stroke-linecap="round"/>
          </svg>
          <input type="range" id="vol-slider" min="0" max="100" value="80" aria-label="Volume">
        </div>

        <div id="media-status">Nessun media</div>

      </div><!-- /music-info -->

    </div><!-- /music-panel -->

  </div><!-- /main -->

</div><!-- /app -->

<!-- ════ LOCKSCREEN ════ -->
<div id="lockscreen" role="button" aria-label="Tocca per sbloccare">

  <div id="ls-clock">
    <div id="ls-time">00:00</div>
    <div id="ls-date">—</div>
  </div>

  <div id="ls-music">
    <div id="ls-np-label">In riproduzione</div>
    <div id="ls-title">Nessuna traccia</div>
    <div id="ls-artist">—</div>

    <div id="ls-controls">

      <!-- Prev lockscreen -->
      <button class="ls-ctrl-btn" id="ls-prev" type="button" aria-label="Precedente">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M19 20L9 12l10-8v16Z" fill="rgba(255,255,255,.8)"/>
          <rect x="5" y="4" width="2.5" height="16" rx="1.25" fill="rgba(255,255,255,.8)"/>
        </svg>
      </button>

      <!-- Play lockscreen -->
      <button id="ls-play-btn" type="button" aria-label="Play/Pausa">
        <svg id="ls-play-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M6 4l14 8-14 8V4Z" fill="#ffffff"/>
        </svg>
      </button>

      <!-- Next lockscreen -->
      <button class="ls-ctrl-btn" id="ls-next" type="button" aria-label="Successivo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M5 4l10 8-10 8V4Z" fill="rgba(255,255,255,.8)"/>
          <rect x="16.5" y="4" width="2.5" height="16" rx="1.25" fill="rgba(255,255,255,.8)"/>
        </svg>
      </button>

    </div>

    <div id="ls-hint">Tocca per tornare all'app</div>
  </div>

</div><!-- /lockscreen -->

<script>
/* ─────────────────────────────────────────────
   CLOCK
───────────────────────────────────────────── */
const DAYS   = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const MONTHS = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
const pad = n => String(n).padStart(2, '0');

function updateClock() {
  const now = new Date();
  const h = pad(now.getHours());
  const m = pad(now.getMinutes());
  const s = pad(now.getSeconds());

  document.getElementById('clock-time').textContent    = `${h}:${m}`;
  document.getElementById('clock-seconds').textContent = s;
  document.getElementById('ls-time').textContent       = `${h}:${m}`;

  const ds = `${DAYS[now.getDay()]} ${now.getDate()} ${MONTHS[now.getMonth()]}`;
  document.getElementById('clock-date').textContent = ds;
  document.getElementById('ls-date').textContent    = ds;

  // Ring: secondi nel minuto corrente
  const circ   = 213.6;
  const offset = circ - (now.getSeconds() / 60) * circ;
  document.getElementById('ring-fill').style.strokeDashoffset = offset;
}

setInterval(updateClock, 1000);
updateClock();

/* ─────────────────────────────────────────────
   WAKE LOCK
───────────────────────────────────────────── */
let wakeLock = null;
const awakeBtn  = document.getElementById('awake-btn');
const awakeText = document.getElementById('awake-text');

async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) {
    awakeText.textContent = 'Non disponibile';
    return;
  }
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    awakeBtn.classList.add('on');
    awakeText.textContent = 'Schermo ON';
    wakeLock.addEventListener('release', () => {
      wakeLock = null;
      awakeBtn.classList.remove('on');
      awakeText.textContent = 'Schermo attivo';
    });
  } catch (e) {
    awakeText.textContent = 'Errore';
  }
}

async function releaseWakeLock() {
  if (wakeLock) await wakeLock.release();
}

awakeBtn.addEventListener('click', () => {
  wakeLock ? releaseWakeLock() : acquireWakeLock();
});

// Riacquisisce se la pagina torna in foreground e era attivo
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && awakeBtn.classList.contains('on') && !wakeLock) {
    acquireWakeLock();
  }
});

/* ─────────────────────────────────────────────
   MEDIA SESSION
───────────────────────────────────────────── */
let isPlaying = false;

const playIconEl   = document.getElementById('play-icon');
const lsPlayIconEl = document.getElementById('ls-play-icon');
const statusEl     = document.getElementById('media-status');

// SVG paths
const SVG_PLAY  = '<path d="M6 4l14 8-14 8V4Z" fill="#ffffff"/>';
const SVG_PAUSE = '<rect x="5" y="4" width="4" height="16" rx="1.5" fill="#ffffff"/><rect x="15" y="4" width="4" height="16" rx="1.5" fill="#ffffff"/>';
const SVG_PLAY_LS  = '<path d="M6 4l14 8-14 8V4Z" fill="#ffffff"/>';
const SVG_PAUSE_LS = '<rect x="5" y="4" width="4" height="16" rx="1.5" fill="#ffffff"/><rect x="15" y="4" width="4" height="16" rx="1.5" fill="#ffffff"/>';

function setPlayState(playing) {
  isPlaying = playing;
  playIconEl.innerHTML   = playing ? SVG_PAUSE    : SVG_PLAY;
  lsPlayIconEl.innerHTML = playing ? SVG_PAUSE_LS : SVG_PLAY_LS;
}

function updateMediaInfo() {
  if (!('mediaSession' in navigator)) {
    statusEl.textContent = 'Media Session non supportata';
    return;
  }

  const meta = navigator.mediaSession.metadata;
  if (meta) {
    document.getElementById('track-title').textContent  = meta.title  || 'Sconosciuto';
    document.getElementById('track-artist').textContent = meta.artist || meta.album || '—';
    document.getElementById('ls-title').textContent     = meta.title  || 'Sconosciuto';
    document.getElementById('ls-artist').textContent    = meta.artist || meta.album || '—';
    statusEl.textContent  = '● Media attivo';
    statusEl.className    = 'ok';
  } else {
    document.getElementById('track-title').textContent  = 'Nessuna traccia';
    document.getElementById('track-artist').textContent = '—';
    document.getElementById('ls-title').textContent     = 'Nessuna traccia';
    document.getElementById('ls-artist').textContent    = '—';
    statusEl.textContent = 'Nessun media';
    statusEl.className   = '';
  }

  const ps = navigator.mediaSession.playbackState;
  if      (ps === 'playing') setPlayState(true);
  else if (ps === 'paused')  setPlayState(false);
}

setInterval(updateMediaInfo, 2000);
updateMediaInfo();

function doAction(action) {
  try { navigator.mediaSession?.callActionHandler?.(action); } catch(_) {}
}

document.getElementById('play-btn').addEventListener('click', () => {
  if (isPlaying) doAction('pause'); else doAction('play');
  setPlayState(!isPlaying);
});

document.getElementById('btn-prev').addEventListener('click', () => doAction('previoustrack'));
document.getElementById('btn-next').addEventListener('click', () => doAction('nexttrack'));

// Lockscreen controls
document.getElementById('ls-play-btn').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('play-btn').click();
});
document.getElementById('ls-prev').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('btn-prev').click();
});
document.getElementById('ls-next').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('btn-next').click();
});

// Volume (agisce sugli elementi <audio>/<video> della pagina)
document.getElementById('vol-slider').addEventListener('input', e => {
  const v = e.target.value / 100;
  document.querySelectorAll('audio, video').forEach(el => el.volume = v);
});

/* ─────────────────────────────────────────────
   LOCKSCREEN TOGGLE
───────────────────────────────────────────── */
const lockscreen = document.getElementById('lockscreen');

document.getElementById('lockmode-toggle').addEventListener('change', e => {
  lockscreen.classList.toggle('show', e.target.checked);
});

lockscreen.addEventListener('click', () => {
  lockscreen.classList.remove('show');
  document.getElementById('lockmode-toggle').checked = false;
});

lockscreen.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

/* ─────────────────────────────────────────────
   SERVICE WORKER (offline support)
───────────────────────────────────────────── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
